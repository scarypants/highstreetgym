components:
  schemas:
    UserCredentials:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          example: "admin@highstreetgym.tld"
        password:
          type: string
          example: "admin"
    AuthenticationKey:
      type: object
      required:
        - key
      properties:
        key:
          type: string
          format: uuid
    Post:
      type: object
      required:
        - subject
        - content
        - writerId
      properties:
        id:
          type: number
          example: 1
        subject:
          type: string
          example: "Morning Yoga Flow"
        content:
          type: string
          example: "Join me for a gentle yoga session tomorrow at 7 AM in Studio B. Perfect way to start your day relaxed and strong!"
        writerId:
          type: number
          example: 8
    User:
      type: object
      required:
        - role
        - firstName
        - lastName
        - email
        - password
      properties:
        id:
          type: number
          example: 1
        role:
          type: string
          example: "member"
          enum: ["admin", "trainer", "member"]
        firstName:
          type: string
          example: "test1"
        lastName:
          type: string
          example: "test1"
        email:
          type: string
          example: "test1@highstreetgym.tld"
        password:
          type: string
          example: "test1"
        authenticationKey:
          type: string
          format: uuid 
    HandledUser:
      type: object
      required:
        - firstName
        - lastName
        - email
        - password
      properties:
        id:
          type: number
          example: 1
        role:
          type: string
          example: "member"
          enum: ["admin", "trainer", "member"]
        firstName:
          type: string
          example: "test1"
        lastName:
          type: string
          example: "test1"
        email:
          type: string
          example: "test1@highstreetgym.tld"
        password:
          type: string
          example: "test1"
        authenticationKey:
          type: string
          format: uuid 
    UserSummary:
      type: object
      required:
        - firstName
        - lastName
      properties:
        id:
          type: number
          example: 1
        firstName:
          type: string
          example: "admin"
        lastName:
          type: string
          example: "admin"
    Session:
      type: object
      required:
        - activityId
        - date
        - time
        - locationId
        - trainerId
      properties:
        id:
          type: number
          example: 1
        activityId:
          type: number
          example: 1
        date:
          type: string
          pattern: '^(0[1-9]|[12]\d|3[01])/(0[1-9]|1[0-2])/\d{4}$'
          example: "11/05/2025"
        time:
          type: string
          pattern: '^(?:[01]\d|2[0-3]):[0-5]\d$'
          example: "08:00"
        locationId:
          type: number
          example: 1
        trainerId:
          type: number
          example: 9
    ActivitySummary:
      type: object
      required:
        - name
      properties:
        name:
            type: string
            example: "YOGA"
    Booking:
      type: object
      required:
        - memberId
        - sessionId
      properties:
        id:
          type: number
          example: 1
        memberId:
          type: number
          example: 10
        sessionId:
          type: number
          example: 17
    LocationSummary:
      type: object
      required:
          - name
      properties:
          name:
              type: string
              example: "Ashgrove"
  responses:
    LoginSuccessful:
      description: "Login successful"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/AuthenticationKey"
    LogoutSuccessful:
      description: "Logout successful"
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                example: "Logout successful"
    Updated:
      description: "A item was updated"
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                example: "Item updated"
    Created:
      description: A new item was created
      content:
        application/json:
          schema:
            type: object
            required:
              - id
              - message
            properties:
              id:
                type: number
                example: 1
              message:
                type: string
                example: "Item created"
    Put:
      description: A new item was created or updated
      content:
        application/json:
          schema:
            type: object
            required:
              - message
            properties:
              id:
                type: number
                example: 1
              message:
                type: string
                example: "Item created"
    NotFound:
      description: "Item not found"
      content:
        application/json:
          schema:
            type: object
            required:
              - message
            properties:
              message:
                type: string
                example: "Item not found"
    Error:
      description: "An error as occurred"
      content:
        application/json:
          schema:
            type: object
            required:
              - message
            properties:
              message:
                type: string
                example: "Something went wrong"
              errors:
                type: array